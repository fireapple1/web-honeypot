services:
  core:
    build:
      context: ./core
    ports:
      - "8080:8080"
    volumes:
      - db-data:/data
    restart: unless-stopped

  api:
    build:
      context: ./api
    ports:
      - "8081:8081"
    volumes:
      - db-data:/data
    environment:
      DB_PATH: /data/honeypot.db
    depends_on:
      - core
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      args:
        VITE_API_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db-data:
